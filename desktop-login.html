<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول - منصة الفلك</title>
<style>
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0f0a1a; color: #fff; font-family: 'Cairo', Arial, sans-serif; text-align: center;
  }
  .box { padding: 40px; }
  .spinner {
    width: 48px; height: 48px; margin: 0 auto 20px;
    border: 4px solid rgba(99,102,241,0.25); border-top-color: #6366f1;
    border-radius: 50%; animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { margin: 0 0 8px; font-weight: 700; }
  p { color: #94a3b8; margin: 0; }
  .error { color: #f87171; }
  a.btn {
    display: inline-block; margin-top: 18px; padding: 10px 22px; border-radius: 8px;
    background: #6366f1; color: #fff; text-decoration: none; font-weight: 600;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="box">
    <div id="spinner" class="spinner"></div>
    <h2 id="title">جاري تسجيل الدخول...</h2>
    <p id="subtitle">من فضلك اختر حساب جوجل في النافذة التي ستظهر</p>
    <div id="actions"></div>
  </div>

<script>
  // ===== نفس إعدادات Firebase الموجودة في التطبيق =====
  const firebaseConfig = {
    apiKey: "AIzaSyCAgFi4D9hwtuK391fLsbnDuh5AtTDIHKU",
    authDomain: "planning-with-ai-390af.firebaseapp.com",
    projectId: "planning-with-ai-390af",
    storageBucket: "planning-with-ai-390af.firebasestorage.app",
    messagingSenderId: "601755857673",
    appId: "1:601755857673:web:b9d7d63e13035412a819d8"
  };
  firebase.initializeApp(firebaseConfig);

  const titleEl = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const spinnerEl = document.getElementById('spinner');
  const actionsEl = document.getElementById('actions');

  function showError(message) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = 'حدث خطأ';
    titleEl.classList.add('error');
    subtitleEl.textContent = message;
    actionsEl.innerHTML = '<a class="btn" href="javascript:location.reload()">حاول مرة أخرى</a>';
  }

  function sendBackToApp(idToken, accessToken) {
    titleEl.textContent = 'تم تسجيل الدخول بنجاح!';
    subtitleEl.textContent = 'يمكنك الرجوع الآن إلى التطبيق...';
    spinnerEl.style.display = 'none';

    const params = new URLSearchParams();
    if (idToken) params.set('id_token', idToken);
    if (accessToken) params.set('access_token', accessToken);

    const appUrl = 'astroapp://auth?' + params.toString();

    // نحاول نفتح التطبيق تلقائياً، ونوفر زرار يدوي احتياطي
    window.location.href = appUrl;
    actionsEl.innerHTML = '<a class="btn" href="' + appUrl + '">الرجوع إلى التطبيق</a>';
  }

  // عند الدخول لهذه الصفحة، نبدأ تسجيل الدخول بجوجل مباشرة (نحن في متصفح حقيقي، فجوجل تسمح بذلك)
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then((result) => {
      const credential = result.credential;
      sendBackToApp(credential.idToken, credential.accessToken);
    })
    .catch((error) => {
      console.error(error);
      if (error.code === 'auth/popup-closed-by-user') {
        showError('تم إغلاق نافذة تسجيل الدخول. حاول مرة أخرى.');
      } else {
        showError(error.message || 'تعذر تسجيل الدخول. حاول مرة أخرى.');
      }
    });
</script>
</body>
</html>
