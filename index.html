    </div>
    <div class="modal-body">
      <p style="margin-bottom:1.5rem;color:#aaa">سجل الدخول باستخدام حساب Google</p>
      <button class="btn btn-google" onclick="loginWithGoogle()" style="background:#4285F4;width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem">
        <i class="fab fa-google"></i> تسجيل الدخول بحساب Google
      </button>
      <div id="loginError" style="color:#ef4444; margin-top:1rem; font-size:0.85rem; text-align:center; display:none;"></div>
    </div>
  </div>
</div>

<div class="app-wrapper" id="appWrapper" style="display: none;">
  <!-- محتوى المنصة كاملاً (نفس الكود السابق) -->
  <nav class="navbar">
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-planet-ringed"></i></div>
      <div class="brand-text">
        <h1>Astronomy and space</h1>
        <p>Cloud Version ☁️</p>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost" onclick="showLogin()" id="adminBtn"><i class="fas fa-lock"></i> دخول المشرف</button>
      <button class="btn btn-danger" onclick="logout()" style="display:none" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
      <button class="maintenance-btn" onclick="openMaintenanceModal()" style="display:none" id="maintenanceBtn" title="تحديث المحتوى"><i class="fas fa-tools"></i> تحديث المحتوى</button>
      <span id="userNameDisplay" style="color:#fff; margin-left:1rem;"></span>
    </div>
  </nav>
  <!-- باقي أقسام المنصة (نفس الكود السابق) -->
  <!-- ... -->
</div>

<script>
  // تهيئة Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyCAgFi4D9hwtuK391fLsbnDuh5AtTDIHKU",
    authDomain: "planning-with-ai-390af.firebaseapp.com",
    projectId: "planning-with-ai-390af",
    storageBucket: "planning-with-ai-390af.firebasestorage.app",
    messagingSenderId: "601755857673",
    appId: "1:601755857673:web:b9d7d63e13035412a819d8"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  // متغيرات عامة (نفس الكود السابق)
  let isAdmin = false, isSuperAdmin = false, videos = [], exams = [], examResults = [], aiKnowledgeBase = [], uploadWidget = null;
  let unsubscribeVideos = null, unsubscribeExams = null, unsubscribeExamResults = null, unsubscribeAIKnowledge = null, unsubscribeMaintenance = null;
  let pendingVideoInfo = null, currentEditVideoId = null, currentExam = null, currentVideoIdForExam = null, currentExamAnswers = {}, examTimer = null, examTimeRemaining = 0;
  let progressInterval = null, metadataListener = null, lastWatchedData = null, currentUser = null, currentUserPhone = null, chatUnsubscribe = null;
  let mediaRecorder = null, audioChunks = [], recordingTimer = null, localStream = null, callTimer = null, callSeconds = 0, unreadMessages = 0, isRecording = false;
  let currentAudio = null, currentAudioBtn = null, userPresenceRef = null, onlineUnsubscribe = null, presenceInterval = null, maintenanceTimerInterval = null, tickInterval = null;
  let maintenanceEndTime = null, uploadStartTime = 0, lastUploadedBytes = 0, lastTime = 0;
  let voiceSettings = { voiceURI: null, rate: 1, pitch: 1 };
  let isLoadingVideos = true;

  const CLOUDINARY_CONFIG = { cloudName: "dnnsna4il", uploadPreset: "falak_upload", apiKey: "364194664384272" };
  const ADMIN_PASS = "@@@&&&((()))", SUPER_ADMIN_PASS = "1#3_5-7(9/0", MAX_VIDEO_SIZE = 104857600, CHUNK_SIZE = 10485760, MAX_STORAGE = 26843545600, STORAGE_KEY = "falak_last_watched";

  // دوال مساعدة (نفس الكود السابق)
  function showToast(msg) { const t = document.getElementById("toast"); t && (t.textContent = msg, t.classList.add("show"), setTimeout(() => t.classList.remove("show"), 4000)); }
  function formatDuration(sec) { if (!sec) return ""; const m = Math.floor(sec / 60), s = Math.floor(sec % 60); return m + ":" + (s < 10 ? "0" : "") + s; }
  function formatSize(b) { return b ? b < 1024 ? b + " B" : b < 1048576 ? (b / 1024).toFixed(1) + " KB" : b < 1073741824 ? (b / 1048576).toFixed(1) + " MB" : (b / 1073741824).toFixed(2) + " GB" : "0 B"; }
  function escapeHtml(unsafe) { const div = document.createElement("div"); div.textContent = unsafe; return div.innerHTML; }

  // تأثيرات صوتية مبسطة (نفس الكود السابق)
  const SoundEffects = { /* ... */ };

  function speakText(text) { /* ... */ }
  function populateVoiceList() { /* ... */ }
  function saveVoiceSettings() { /* ... */ }
  function loadVoiceSettings() { /* ... */ }
  function openVoiceSettings() { /* ... */ }
  function closeVoiceSettings() { /* ... */ }
  document.addEventListener("input", function (e) { /* ... */ });

  // ========== دوال المصادقة المحسنة ==========
  let currentAuthUser = null;

  function loginWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    auth.signInWithPopup(provider)
      .then(result => {
        console.log("✅ Google login success:", result.user);
        currentAuthUser = result.user;
        afterLogin();
      })
      .catch(error => {
        console.error("❌ Google login error:", error);
        let errorMsg = "❌ فشل تسجيل الدخول بـ Google: ";
        if (error.code === 'auth/popup-blocked') errorMsg = "⚠️ المتصفح منع النافذة المنبثقة. يرجى السماح بالنوافذ المنبثقة لهذا الموقع وإعادة المحاولة.";
        else if (error.code === 'auth/unauthorized-domain') errorMsg = "❌ النطاق غير مصرح به. تأكد من إضافة هذا النطاق في Firebase Console.";
        else errorMsg += error.message;
        showToast(errorMsg);
        const errDiv = document.getElementById("loginError");
        if (errDiv) { errDiv.textContent = errorMsg; errDiv.style.display = "block"; setTimeout(() => errDiv.style.display = "none", 5000); }
      });
  }

  function afterLogin() {
    try {
      console.log("🟢 afterLogin started, user:", currentAuthUser);
      if (!currentAuthUser) {
        console.error("❌ No user data in afterLogin");
        showToast("❌ لم يتم الحصول على بيانات المستخدم.");
        return;
      }
      currentUser = currentAuthUser.displayName || currentAuthUser.email.split('@')[0];
      currentUserPhone = currentAuthUser.phoneNumber || '';
      localStorage.setItem('falak_username', currentUser);
      localStorage.setItem('falak_userphone', currentUserPhone);

      const loginModal = document.getElementById('loginModal');
      const appWrapper = document.getElementById('appWrapper');
      if (!loginModal || !appWrapper) {
        console.error("❌ Required elements not found: loginModal or appWrapper");
        return;
      }

      loginModal.classList.remove('active');
      loginModal.style.display = 'none'; // تأكيد الإخفاء
      appWrapper.style.display = 'flex'; // إظهار المحتوى

      console.log("✅ AppWrapper display set to flex");

      // تحديث اسم المستخدم في الشريط
      const adminBtn = document.getElementById('adminBtn');
      if (adminBtn) adminBtn.innerHTML = `<i class="fas fa-user"></i> ${currentUser}`;
      const userNameSpan = document.getElementById('userNameDisplay');
      if (userNameSpan) userNameSpan.textContent = currentUser;

      // تحميل بيانات المنصة
      loadAdminPreference();
      listenToVideosWithRetry(4);
      listenToMaintenance();
      loadAIKnowledgeFromFirebase();
      loadExamsFromFirebase();
      loadExamResultsFromFirebase();
      initCloudinaryWidget().catch(e => console.warn(e));
      checkUrlForShare();
      showToast(`مرحباً ${currentUser}!`);
      console.log("✅ afterLogin finished successfully");
    } catch (err) {
      console.error("🔥 afterLogin error:", err);
      showToast("حدث خطأ في تحميل الصفحة، حاول تحديث المتصفح.");
    }
  }

  function logout() {
    auth.signOut().then(() => {
      currentAuthUser = null; currentUser = null; currentUserPhone = null;
      localStorage.removeItem('falak_username'); localStorage.removeItem('falak_userphone'); localStorage.removeItem('falak_admin');
      const appWrapper = document.getElementById('appWrapper');
      const loginModal = document.getElementById('loginModal');
      if (appWrapper) appWrapper.style.display = 'none';
      if (loginModal) {
        loginModal.style.display = 'flex';
        loginModal.classList.add('active');
      }
      isAdmin = false; isSuperAdmin = false;
      const adminBtn = document.getElementById('adminBtn');
      if (adminBtn) adminBtn.innerHTML = '<i class="fas fa-lock"></i> دخول المشرف';
      document.getElementById('uploadZone')?.classList.remove('active');
      document.getElementById('storageBar')?.style.setProperty('display', 'none');
      document.getElementById('logoutBtn')?.style.setProperty('display', 'none');
      document.getElementById('maintenanceBtn')?.style.setProperty('display', 'none');
      document.getElementById('setAdminsBtn')?.style.setProperty('display', 'none');
      document.getElementById('teachAICircleBtn')?.style.setProperty('display', 'none');
      showToast('تم تسجيل الخروج');
    }).catch(error => showToast('❌ فشل تسجيل الخروج'));
  }

  function checkAuthState() {
    if (!firebase.auth) { console.error("Firebase Auth not loaded"); return; }
    auth.onAuthStateChanged(user => {
      if (user) {
        console.log("🟢 Auth state changed: user logged in", user.displayName);
        currentAuthUser = user;
        afterLogin();
      } else {
        console.log("🔴 Auth state changed: user logged out");
        const appWrapper = document.getElementById('appWrapper');
        const loginModal = document.getElementById('loginModal');
        if (appWrapper) appWrapper.style.display = 'none';
        if (loginModal) {
          loginModal.style.display = 'flex';
          loginModal.classList.add('active');
        }
      }
    });
  }

  // جميع دوال المنصة الأساسية (يجب تضمينها كاملة من الكود السابق)
  // نظرًا لطول الكود، يتم تضمينها في الملف النهائي الذي تم إرساله سابقاً.
  // هنا نضع فقط الدوال التي تعتمد عليها afterLogin لتجنب الأخطاء:
  function loadAdminPreference() { if ("true" === localStorage.getItem("falak_admin")) { isAdmin = true; document.getElementById("uploadZone").classList.add("active"); document.getElementById("adminBtn").style.display = "none"; document.getElementById("logoutBtn").style.display = "flex"; document.getElementById("maintenanceBtn").style.display = "flex"; document.getElementById("setAdminsBtn").style.display = "inline-flex"; document.getElementById("teachAICircleBtn").style.display = "inline-flex"; updateStorageBar(); loadAIKnowledgeFromFirebase(); const a = document.getElementById("cancelMaintenanceBtn"); a && document.getElementById("maintenanceOverlay")?.classList.contains("active") && a.classList.add("active"); } }
  function listenToVideosWithRetry(maxAttempts = 4) { /* ... */ }
  function listenToMaintenance() { /* ... */ }
  function loadAIKnowledgeFromFirebase() { /* ... */ }
  function loadExamsFromFirebase() { /* ... */ }
  function loadExamResultsFromFirebase() { /* ... */ }
  function initCloudinaryWidget() { return Promise.resolve(); }
  function checkUrlForShare() { /* ... */ }
  function updateStorageBar() { /* ... */ }

  window.addEventListener("load", function() {
    console.log("🚀 Page loaded");
    document.getElementById("loader")?.classList.add("hidden");
    checkAuthState();
    setTimeout(() => document.getElementById("loader")?.classList.add("hidden"), 5000);
  });
</script>
</body>
</html>
