<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050308"/>
      <stop offset="40%" style="stop-color:#0f0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <!-- Nebula glow -->
    <radialGradient id="nebula1" cx="80%" cy="30%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="15%" cy="75%" r="40%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nebula3" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:0"/>
    </radialGradient>
    <!-- Planet gradients -->
    <radialGradient id="planetGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#7c6aff"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </radialGradient>
    <radialGradient id="moonGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </radialGradient>
    <!-- Ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.1"/>
      <stop offset="30%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#c4b5fd;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.1"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#c4b5fd"/>
      <stop offset="70%" style="stop-color:#f0abfc"/>
      <stop offset="100%" style="stop-color:#a5b4fc"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip paths -->
    <clipPath id="planetClip">
      <circle cx="950" cy="210" r="130"/>
    </clipPath>
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1200" height="420" rx="20"/>
    </clipPath>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g clip-path="url(#bannerClip)">
    <rect width="1200" height="420" fill="url(#bgGrad)" rx="20"/>

    <!-- Nebula layers -->
    <rect width="1200" height="420" fill="url(#nebula1)"/>
    <rect width="1200" height="420" fill="url(#nebula2)"/>
    <rect width="1200" height="420" fill="url(#nebula3)"/>

    <!-- ============ STARS ============ -->
    <!-- Large bright stars -->
    <g filter="url(#starGlow)">
      <circle cx="120" cy="40" r="2.2" fill="#fff" opacity="0.9"/>
      <circle cx="340" cy="15" r="1.8" fill="#c4b5fd" opacity="0.85"/>
      <circle cx="580" cy="55" r="2" fill="#fff" opacity="0.8"/>
      <circle cx="750" cy="25" r="1.5" fill="#a5b4fc" opacity="0.9"/>
      <circle cx="1080" cy="60" r="2" fill="#fff" opacity="0.85"/>
      <circle cx="1150" cy="150" r="1.8" fill="#c4b5fd" opacity="0.7"/>
      <circle cx="60" cy="200" r="1.5" fill="#fff" opacity="0.75"/>
      <circle cx="200" cy="320" r="2" fill="#a5b4fc" opacity="0.8"/>
      <circle cx="450" cy="390" r="1.8" fill="#fff" opacity="0.7"/>
      <circle cx="700" cy="380" r="1.5" fill="#c4b5fd" opacity="0.8"/>
    </g>

    <!-- Small stars scattered -->
    <circle cx="80" cy="70" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="155" cy="120" r="0.8" fill="#fff" opacity="0.4"/>
    <circle cx="230" cy="60" r="1" fill="#c4b5fd" opacity="0.55"/>
    <circle cx="310" cy="90" r="0.7" fill="#fff" opacity="0.45"/>
    <circle cx="400" cy="30" r="1.1" fill="#fff" opacity="0.6"/>
    <circle cx="480" cy="100" r="0.8" fill="#a5b4fc" opacity="0.5"/>
    <circle cx="520" cy="160" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="600" cy="20" r="0.9" fill="#fff" opacity="0.55"/>
    <circle cx="670" cy="80" r="1.1" fill="#c4b5fd" opacity="0.5"/>
    <circle cx="720" cy="140" r="0.7" fill="#fff" opacity="0.4"/>
    <circle cx="800" cy="35" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="860" cy="110" r="0.8" fill="#a5b4fc" opacity="0.45"/>
    <circle cx="1020" cy="30" r="1.1" fill="#fff" opacity="0.55"/>
    <circle cx="1100" cy="90" r="0.9" fill="#fff" opacity="0.5"/>
    <circle cx="1160" cy="200" r="0.8" fill="#c4b5fd" opacity="0.4"/>
    <circle cx="50" cy="300" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="130" cy="380" r="0.8" fill="#fff" opacity="0.45"/>
    <circle cx="280" cy="350" r="1" fill="#a5b4fc" opacity="0.5"/>
    <circle cx="380" cy="310" r="0.7" fill="#fff" opacity="0.4"/>
    <circle cx="550" cy="330" r="1.1" fill="#fff" opacity="0.55"/>
    <circle cx="640" cy="300" r="0.8" fill="#c4b5fd" opacity="0.45"/>
    <circle cx="760" cy="350" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="1140" cy="350" r="0.9" fill="#fff" opacity="0.5"/>

    <!-- 4-pointed sparkle stars -->
    <g filter="url(#starGlow)" opacity="0.8">
      <path d="M30,180 L32,174 L34,180 L40,182 L34,184 L32,190 L30,184 L24,182 Z" fill="#fff"/>
      <path d="M490,340 L492,335 L494,340 L499,342 L494,344 L492,349 L490,344 L485,342 Z" fill="#c4b5fd"/>
      <path d="M1180,120 L1182,115 L1184,120 L1189,122 L1184,124 L1182,129 L1180,124 L1175,122 Z" fill="#fff"/>
      <path d="M680,400 L682,394 L684,400 L690,402 L684,404 L682,410 L680,404 L674,402 Z" fill="#a5b4fc" opacity="0.6"/>
    </g>

    <!-- ============ MILKY WAY BAND ============ -->
    <ellipse cx="600" cy="210" rx="700" ry="80" fill="none" stroke="rgba(99,102,241,0.07)" stroke-width="60"/>

    <!-- ============ SHOOTING STAR ============ -->
    <line x1="150" y1="80" x2="50" y2="140" stroke="url(#titleGrad)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <circle cx="150" cy="80" r="2" fill="#fff" opacity="0.7"/>

    <!-- ============ SATURN-LIKE PLANET (right side) ============ -->
    <!-- Planet shadow -->
    <circle cx="953" cy="213" r="132" fill="rgba(0,0,0,0.4)" filter="url(#softGlow)"/>
    <!-- Rings (behind planet) -->
    <ellipse cx="950" cy="210" rx="200" ry="35" fill="none" stroke="url(#ringGrad)" stroke-width="18" opacity="0.55"/>
    <ellipse cx="950" cy="210" rx="170" ry="28" fill="none" stroke="url(#ringGrad)" stroke-width="10" opacity="0.4"/>
    <!-- Planet body -->
    <circle cx="950" cy="210" r="130" fill="url(#planetGrad)"/>
    <!-- Planet surface detail -->
    <ellipse cx="950" cy="180" rx="120" ry="30" fill="rgba(255,255,255,0.05)" clip-path="url(#planetClip)"/>
    <ellipse cx="950" cy="220" rx="115" ry="25" fill="rgba(0,0,0,0.1)" clip-path="url(#planetClip)"/>
    <ellipse cx="950" cy="250" rx="110" ry="20" fill="rgba(255,255,255,0.03)" clip-path="url(#planetClip)"/>
    <!-- Planet shine -->
    <ellipse cx="895" cy="160" rx="45" ry="30" fill="rgba(255,255,255,0.12)" clip-path="url(#planetClip)"/>
    <!-- Rings (in front) -->
    <path d="M820,210 Q950,185 1080,210" stroke="url(#ringGrad)" stroke-width="18" fill="none" opacity="0.6"/>
    <path d="M840,210 Q950,190 1060,210" stroke="url(#ringGrad)" stroke-width="10" fill="none" opacity="0.45"/>

    <!-- ============ SMALL MOON ============ -->
    <circle cx="820" cy="100" r="28" fill="url(#moonGrad)" filter="url(#glow)"/>
    <circle cx="810" cy="90" r="25" fill="rgba(255,255,255,0.06)"/>
    <!-- Moon craters -->
    <circle cx="825" cy="95" r="6" fill="rgba(0,0,0,0.2)"/>
    <circle cx="812" cy="108" r="4" fill="rgba(0,0,0,0.15)"/>

    <!-- ============ SMALL SUN / STAR ============ -->
    <circle cx="1150" cy="330" r="22" fill="url(#sunGrad)" filter="url(#softGlow)" opacity="0.9"/>
    <circle cx="1150" cy="330" r="30" fill="rgba(245,158,11,0.15)" filter="url(#softGlow)"/>

    <!-- ============ ORBIT LINES ============ -->
    <ellipse cx="600" cy="350" rx="550" ry="40" fill="none" stroke="rgba(99,102,241,0.12)" stroke-width="1" stroke-dasharray="8,6"/>
    <ellipse cx="400" cy="280" rx="320" ry="25" fill="none" stroke="rgba(236,72,153,0.1)" stroke-width="1" stroke-dasharray="6,8"/>

    <!-- ============ CONSTELLATION DOTS ============ -->
    <g opacity="0.4">
      <circle cx="100" cy="250" r="2" fill="#a5b4fc"/>
      <circle cx="130" cy="230" r="1.5" fill="#a5b4fc"/>
      <circle cx="160" cy="245" r="2" fill="#a5b4fc"/>
      <circle cx="145" cy="265" r="1.5" fill="#a5b4fc"/>
      <line x1="100" y1="250" x2="130" y2="230" stroke="#6366f1" stroke-width="0.7" opacity="0.6"/>
      <line x1="130" y1="230" x2="160" y2="245" stroke="#6366f1" stroke-width="0.7" opacity="0.6"/>
      <line x1="160" y1="245" x2="145" y2="265" stroke="#6366f1" stroke-width="0.7" opacity="0.6"/>
      <line x1="145" y1="265" x2="100" y2="250" stroke="#6366f1" stroke-width="0.7" opacity="0.6"/>
    </g>

    <!-- ============ DECORATIVE PARTICLES ============ -->
    <circle cx="820" cy="350" r="3" fill="#6366f1" opacity="0.6"/>
    <circle cx="760" cy="310" r="2" fill="#ec4899" opacity="0.5"/>
    <circle cx="870" cy="290" r="2.5" fill="#8b5cf6" opacity="0.55"/>
    <circle cx="780" cy="380" r="2" fill="#a5b4fc" opacity="0.5"/>

    <!-- ============ TEXT CONTENT ============ -->
    <!-- Badge -->
    <rect x="355" y="55" width="220" height="34" rx="17" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.5)" stroke-width="1"/>
    <text x="465" y="77" text-anchor="middle" font-family="Cairo, Arial, sans-serif" font-size="13" font-weight="600" fill="#10b981">✦ Astronomy and space ✦</text>

    <!-- Main title -->
    <text x="80" y="160" font-family="Cairo, Arial, sans-serif" font-size="56" font-weight="900" fill="url(#titleGrad)" filter="url(#glow)">اكتشف أسرار الكون</text>

    <!-- Subtitle / tagline -->
    <text x="80" y="210" font-family="Cairo, Arial, sans-serif" font-size="26" font-weight="700" fill="url(#subtitleGrad)">منصة متكاملة لتعليم علم الفلك</text>

    <!-- Description -->
    <text x="80" y="255" font-family="Cairo, Arial, sans-serif" font-size="17" fill="rgba(196,181,253,0.85)" font-weight="400">تعلّم الفلك مجاناً · شاهد محاضرات مباشرة · تفاعل مع المجتمع</text>

    <!-- Divider line -->
    <line x1="80" y1="280" x2="520" y2="280" stroke="url(#subtitleGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Stats row -->
    <g font-family="Cairo, Arial, sans-serif" font-weight="600">
      <!-- Stat 1 -->
      <circle cx="100" cy="325" r="22" fill="rgba(99,102,241,0.2)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
      <text x="100" y="320" text-anchor="middle" font-size="14" fill="#a5b4fc">🎬</text>
      <text x="100" y="332" text-anchor="middle" font-size="8" fill="#a5b4fc">فيديوهات</text>
      <!-- Stat 2 -->
      <circle cx="185" cy="325" r="22" fill="rgba(236,72,153,0.2)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
      <text x="185" y="320" text-anchor="middle" font-size="14" fill="#f9a8d4">🔴</text>
      <text x="185" y="332" text-anchor="middle" font-size="8" fill="#f9a8d4">مباشر</text>
      <!-- Stat 3 -->
      <circle cx="270" cy="325" r="22" fill="rgba(16,185,129,0.2)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
      <text x="270" y="320" text-anchor="middle" font-size="14" fill="#6ee7b7">🆓</text>
      <text x="270" y="332" text-anchor="middle" font-size="8" fill="#6ee7b7">مجاني</text>
      <!-- Stat 4 -->
      <circle cx="355" cy="325" r="22" fill="rgba(139,92,246,0.2)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
      <text x="355" y="320" text-anchor="middle" font-size="14" fill="#c4b5fd">🌌</text>
      <text x="355" y="332" text-anchor="middle" font-size="8" fill="#c4b5fd">فلك</text>
    </g>

    <!-- Bottom tagline -->
    <text x="80" y="390" font-family="Cairo, Arial, sans-serif" font-size="14" fill="rgba(148,163,184,0.7)" font-style="italic">ابدأ رحلتك في عالم النجوم والكواكب اليوم ✨</text>

    <!-- ============ BORDER GLOW ============ -->
    <rect x="1" y="1" width="1198" height="418" rx="19" fill="none" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
    <rect x="3" y="3" width="1194" height="414" rx="18" fill="none" stroke="rgba(236,72,153,0.15)" stroke-width="1"/>
  </g>
</svg>
