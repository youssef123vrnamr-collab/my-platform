<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05020e"/>
      <stop offset="50%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#170f3a"/>
    </linearGradient>
    <radialGradient id="neb1" cx="80%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="10%" cy="75%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="45%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetG" cx="32%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#9381ff"/>
      <stop offset="40%" stop-color="#5046e4"/>
      <stop offset="100%" stop-color="#1e1854"/>
    </radialGradient>
    <radialGradient id="planetShine" cx="32%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonG" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#e0d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.02"/>
      <stop offset="20%"  stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#ddd6fe" stop-opacity="0.95"/>
      <stop offset="80%"  stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#e9e3ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="subG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="divG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="pclip"><circle cx="688" cy="188" r="115"/></clipPath>
    <clipPath id="frame"><rect width="900" height="380" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="380" fill="url(#bg)"/>
    <rect width="900" height="380" fill="url(#neb1)"/>
    <rect width="900" height="380" fill="url(#neb2)"/>
    <rect width="900" height="380" fill="url(#neb3)"/>

    <!-- Stars bright -->
    <circle cx="40"  cy="28"  r="2"   fill="#fff"    opacity=".9"  filter="url(#glow)"/>
    <circle cx="180" cy="18"  r="1.7" fill="#c4b5fd" opacity=".85" filter="url(#glow)"/>
    <circle cx="350" cy="40"  r="2"   fill="#fff"    opacity=".8"  filter="url(#glow)"/>
    <circle cx="520" cy="15"  r="1.6" fill="#a5b4fc" opacity=".9"  filter="url(#glow)"/>
    <circle cx="820" cy="50"  r="1.8" fill="#fff"    opacity=".85" filter="url(#glow)"/>
    <circle cx="870" cy="150" r="1.6" fill="#c4b5fd" opacity=".7"  filter="url(#glow)"/>
    <circle cx="30"  cy="200" r="1.5" fill="#fff"    opacity=".75" filter="url(#glow)"/>
    <circle cx="130" cy="320" r="2"   fill="#a5b4fc" opacity=".8"  filter="url(#glow)"/>
    <circle cx="430" cy="360" r="1.8" fill="#fff"    opacity=".65" filter="url(#glow)"/>

    <!-- Stars dim -->
    <circle cx="70"  cy="75"  r=".9" fill="#fff"    opacity=".4"/>
    <circle cx="140" cy="55"  r=".8" fill="#c4b5fd" opacity=".45"/>
    <circle cx="240" cy="90"  r="1"  fill="#fff"    opacity=".35"/>
    <circle cx="310" cy="22"  r=".9" fill="#a5b4fc" opacity=".5"/>
    <circle cx="390" cy="70"  r=".8" fill="#fff"    opacity=".4"/>
    <circle cx="460" cy="110" r="1"  fill="#c4b5fd" opacity=".45"/>
    <circle cx="550" cy="55"  r=".8" fill="#fff"    opacity=".5"/>
    <circle cx="740" cy="25"  r=".9" fill="#fff"    opacity=".55"/>
    <circle cx="800" cy="90"  r=".8" fill="#c4b5fd" opacity=".4"/>
    <circle cx="55"  cy="290" r=".9" fill="#fff"    opacity=".4"/>
    <circle cx="210" cy="345" r=".8" fill="#a5b4fc" opacity=".45"/>
    <circle cx="300" cy="310" r="1"  fill="#fff"    opacity=".35"/>
    <circle cx="420" cy="330" r=".9" fill="#c4b5fd" opacity=".4"/>

    <!-- Sparkles -->
    <path d="M25,170 l2,-6 2,6 6,2 -6,2 -2,6 -2,-6 -6,-2Z"       fill="#fff"    opacity=".7" filter="url(#glow)"/>
    <path d="M870,300 l2,-5 2,5 5,2 -5,2 -2,5 -2,-5 -5,-2Z"       fill="#c4b5fd" opacity=".65" filter="url(#glow)"/>
    <path d="M500,355 l1.5,-5 1.5,5 5,1.5 -5,1.5 -1.5,5 -1.5,-5 -5,-1.5Z" fill="#a5b4fc" opacity=".55" filter="url(#glow)"/>

    <!-- Shooting star -->
    <line x1="120" y1="60" x2="30" y2="120" stroke="url(#titleG)" stroke-width="1.5" opacity=".45" stroke-linecap="round"/>
    <circle cx="120" cy="60" r="2.5" fill="#fff" opacity=".8" filter="url(#glow)"/>

    <!-- Orbit arcs -->
    <ellipse cx="450" cy="380" rx="500" ry="55" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="7,6" opacity=".1"/>
    <ellipse cx="300" cy="300" rx="280" ry="30" fill="none" stroke="#ec4899" stroke-width=".8" stroke-dasharray="5,8" opacity=".08"/>

    <!-- Constellation -->
    <g opacity=".5">
      <circle cx="60"  cy="240" r="2.2" fill="#a5b4fc" filter="url(#glow)"/>
      <circle cx="95"  cy="218" r="1.8" fill="#a5b4fc" filter="url(#glow)"/>
      <circle cx="128" cy="235" r="2"   fill="#a5b4fc" filter="url(#glow)"/>
      <circle cx="112" cy="260" r="1.8" fill="#a5b4fc" filter="url(#glow)"/>
      <line x1="60" y1="240" x2="95"  y2="218" stroke="#6366f1" stroke-width=".8" opacity=".7"/>
      <line x1="95" y1="218" x2="128" y2="235" stroke="#6366f1" stroke-width=".8" opacity=".7"/>
      <line x1="128" y1="235" x2="112" y2="260" stroke="#6366f1" stroke-width=".8" opacity=".7"/>
      <line x1="112" y1="260" x2="60"  y2="240" stroke="#6366f1" stroke-width=".8" opacity=".7"/>
    </g>

    <!-- Planet shadow halo -->
    <circle cx="691" cy="191" r="130" fill="rgba(0,0,0,.45)" filter="url(#softglow)"/>

    <!-- Rings behind -->
    <ellipse cx="688" cy="188" rx="195" ry="33" fill="none" stroke="url(#ringG)" stroke-width="20" opacity=".55"/>
    <ellipse cx="688" cy="188" rx="165" ry="26" fill="none" stroke="url(#ringG)" stroke-width="11" opacity=".42"/>

    <!-- Planet body -->
    <circle cx="688" cy="188" r="115" fill="url(#planetG)"/>
    <ellipse cx="688" cy="165" rx="107" ry="26" fill="rgba(255,255,255,.06)" clip-path="url(#pclip)"/>
    <ellipse cx="688" cy="200" rx="110" ry="22" fill="rgba(0,0,0,.12)"       clip-path="url(#pclip)"/>
    <ellipse cx="688" cy="230" rx="105" ry="18" fill="rgba(255,255,255,.04)" clip-path="url(#pclip)"/>
    <circle  cx="688" cy="188" r="115" fill="url(#planetShine)"/>
    <ellipse cx="640" cy="145" rx="42"  ry="28" fill="rgba(255,255,255,.13)" clip-path="url(#pclip)"/>

    <!-- Rings front -->
    <path d="M573,188 Q688,162 803,188" stroke="url(#ringG)" stroke-width="20" fill="none" opacity=".58"/>
    <path d="M590,188 Q688,167 786,188" stroke="url(#ringG)" stroke-width="11" fill="none" opacity=".44"/>

    <!-- Moon -->
    <circle cx="565" cy="90" r="26" fill="url(#moonG)" filter="url(#glow)"/>
    <circle cx="556" cy="82" r="23" fill="rgba(255,255,255,.07)"/>
    <circle cx="572" cy="86" r="6"  fill="rgba(0,0,0,.22)"/>
    <circle cx="558" cy="98" r="4"  fill="rgba(0,0,0,.18)"/>
    <circle cx="578" cy="100" r="3" fill="rgba(0,0,0,.14)"/>

    <!-- Small sun -->
    <circle cx="858" cy="318" r="18" fill="#f59e0b" opacity=".85" filter="url(#softglow)"/>
    <circle cx="858" cy="318" r="28" fill="rgba(245,158,11,.15)" filter="url(#softglow)"/>

    <!-- Dust particles -->
    <circle cx="620" cy="305" r="2.5" fill="#6366f1" opacity=".55"/>
    <circle cx="580" cy="260" r="2"   fill="#ec4899" opacity=".5"/>
    <circle cx="650" cy="280" r="2"   fill="#8b5cf6" opacity=".5"/>
    <circle cx="595" cy="330" r="1.8" fill="#a5b4fc" opacity=".45"/>
    <circle cx="760" cy="340" r="2"   fill="#6366f1" opacity=".4"/>

    <!-- ════ TEXT ════ -->

    <!-- Badge -->
    <rect x="50" y="44" width="250" height="36" rx="18" fill="rgba(16,185,129,.18)" stroke="rgba(16,185,129,.55)" stroke-width="1.2"/>
    <text x="175" y="67" text-anchor="middle" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" fill="#34d399">✦  Astronomy and space  ✦</text>

    <!-- Main title -->
    <text x="50" y="148" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="62" font-weight="900" fill="url(#titleG)" filter="url(#textglow)">اكتشف أسرار الكون</text>

    <!-- Underline -->
    <rect x="50" y="160" width="460" height="3" rx="1.5" fill="url(#subG)" opacity=".6"/>

    <!-- Subtitle -->
    <text x="50" y="208" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="url(#subG)">منصة متكاملة لتعليم علم الفلك</text>

    <!-- Description -->
    <text x="50" y="248" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="17" fill="rgba(196,181,253,.85)">تعلّم مجاناً · محاضرات مباشرة · دردشة تفاعلية</text>

    <!-- Divider -->
    <rect x="50" y="268" width="400" height="1.5" rx="1" fill="url(#divG)"/>

    <!-- Feature badges -->
    <rect x="50"  y="286" width="90"  height="34" rx="17" fill="rgba(99,102,241,.22)"  stroke="rgba(99,102,241,.5)"  stroke-width="1"/>
    <text x="95"  y="308" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">🎬 فيديوهات</text>

    <rect x="150" y="286" width="82"  height="34" rx="17" fill="rgba(236,72,153,.2)"   stroke="rgba(236,72,153,.5)"  stroke-width="1"/>
    <text x="191" y="308" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="13" font-weight="700" fill="#f9a8d4">🔴 مباشر</text>

    <rect x="242" y="286" width="78"  height="34" rx="17" fill="rgba(16,185,129,.2)"   stroke="rgba(16,185,129,.5)"  stroke-width="1"/>
    <text x="281" y="308" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="13" font-weight="700" fill="#6ee7b7">🆓 مجاني</text>

    <rect x="330" y="286" width="75"  height="34" rx="17" fill="rgba(139,92,246,.2)"   stroke="rgba(139,92,246,.5)"  stroke-width="1"/>
    <text x="368" y="308" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="13" font-weight="700" fill="#c4b5fd">🌌 فلك</text>

    <!-- Tagline -->
    <text x="50" y="358" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="15" fill="rgba(148,163,184,.75)">✨ ابدأ رحلتك في عالم النجوم والكواكب اليوم</text>

    <!-- Border -->
    <rect x="1" y="1" width="898" height="378" rx="19" fill="none" stroke="rgba(99,102,241,.4)"  stroke-width="1.5"/>
    <rect x="3" y="3" width="894" height="374" rx="18" fill="none" stroke="rgba(236,72,153,.15)" stroke-width="1"/>
  </g>
</svg>
