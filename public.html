<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astronomy and Space</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon2.png">
  <link rel="icon" type="image/png" href="icon2.png">
  <meta name="theme-color" content="#0f0a1a">
  <style>
    body {
      background: #050308;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    img { width: 150px; border-radius: 20px; margin-bottom: 20px; }
    h1 { font-size: 24px; }
  </style>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
    // Redirect to main app after 1 second
    setTimeout(() => { window.location.href = "/"; }, 1000);
  </script>
</head>
<body>
  <img src="icon2.png" alt="Astronomy and Space">
  <h1>Astronomy and Space</h1>
</body>
</html>
