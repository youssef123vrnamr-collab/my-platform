<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05020e"/>
      <stop offset="50%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#170f3a"/>
    </linearGradient>
    <radialGradient id="neb1" cx="75%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="15%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0d0820" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="planetG" cx="32%" cy="28%" r="65%">
      <stop offset="0%" stop-color="#9381ff"/>
      <stop offset="40%" stop-color="#5046e4"/>
      <stop offset="100%" stop-color="#1e1854"/>
    </radialGradient>
    <radialGradient id="planetShine" cx="32%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonG" cx="30%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#e0d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.02"/>
      <stop offset="20%"  stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#ddd6fe" stop-opacity="0.95"/>
      <stop offset="80%"  stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="60%"  stop-color="#e9e3ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="subG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="divG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366f1" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#ec4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="pclip"><circle cx="290" cy="130" r="105"/></clipPath>
    <clipPath id="frame"><rect width="400" height="420" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <!-- Background -->
    <rect width="400" height="420" fill="url(#bg)"/>
    <rect width="400" height="420" fill="url(#neb1)"/>
    <rect width="400" height="420" fill="url(#neb2)"/>

    <!-- Stars -->
    <circle cx="20"  cy="18"  r="2"   fill="#fff"    opacity=".9"  filter="url(#glow)"/>
    <circle cx="90"  cy="12"  r="1.6" fill="#c4b5fd" opacity=".85" filter="url(#glow)"/>
    <circle cx="170" cy="30"  r="1.8" fill="#fff"    opacity=".8"  filter="url(#glow)"/>
    <circle cx="340" cy="20"  r="1.6" fill="#a5b4fc" opacity=".9"  filter="url(#glow)"/>
    <circle cx="380" cy="80"  r="1.5" fill="#c4b5fd" opacity=".7"  filter="url(#glow)"/>
    <circle cx="15"  cy="160" r="1.5" fill="#fff"    opacity=".75" filter="url(#glow)"/>
    <circle cx="65"  cy="380" r="1.8" fill="#a5b4fc" opacity=".7"  filter="url(#glow)"/>
    <circle cx="220" cy="400" r="1.6" fill="#fff"    opacity=".6"  filter="url(#glow)"/>
    <!-- Dim stars -->
    <circle cx="35"  cy="55"  r=".9" fill="#fff"    opacity=".4"/>
    <circle cx="110" cy="45"  r=".8" fill="#c4b5fd" opacity=".45"/>
    <circle cx="200" cy="65"  r="1"  fill="#fff"    opacity=".35"/>
    <circle cx="370" cy="140" r=".9" fill="#a5b4fc" opacity=".4"/>
    <circle cx="30"  cy="300" r=".8" fill="#fff"    opacity=".4"/>
    <circle cx="150" cy="350" r="1"  fill="#c4b5fd" opacity=".35"/>

    <!-- Sparkle -->
    <path d="M12,120 l2,-5 2,5 5,2 -5,2 -2,5 -2,-5 -5,-2Z" fill="#fff" opacity=".7" filter="url(#glow)"/>
    <path d="M385,310 l1.5,-4 1.5,4 4,1.5 -4,1.5 -1.5,4 -1.5,-4 -4,-1.5Z" fill="#c4b5fd" opacity=".6" filter="url(#glow)"/>

    <!-- Planet shadow halo -->
    <circle cx="292" cy="133" r="120" fill="rgba(0,0,0,.4)" filter="url(#softglow)"/>

    <!-- Rings behind -->
    <ellipse cx="290" cy="130" rx="175" ry="30" fill="none" stroke="url(#ringG)" stroke-width="18" opacity=".55"/>
    <ellipse cx="290" cy="130" rx="148" ry="24" fill="none" stroke="url(#ringG)" stroke-width="10" opacity=".42"/>

    <!-- Planet body -->
    <circle cx="290" cy="130" r="105" fill="url(#planetG)"/>
    <ellipse cx="290" cy="110" rx="98"  ry="24" fill="rgba(255,255,255,.06)" clip-path="url(#pclip)"/>
    <ellipse cx="290" cy="142" rx="100" ry="20" fill="rgba(0,0,0,.12)"       clip-path="url(#pclip)"/>
    <circle  cx="290" cy="130" r="105" fill="url(#planetShine)"/>
    <ellipse cx="248" cy="96"  rx="38"  ry="25" fill="rgba(255,255,255,.13)" clip-path="url(#pclip)"/>

    <!-- Rings front -->
    <path d="M185,130 Q290,106 395,130" stroke="url(#ringG)" stroke-width="18" fill="none" opacity=".58"/>
    <path d="M200,130 Q290,110 380,130" stroke="url(#ringG)" stroke-width="10" fill="none" opacity=".44"/>

    <!-- Moon -->
    <circle cx="168" cy="42" r="22" fill="url(#moonG)" filter="url(#glow)"/>
    <circle cx="160" cy="35" r="19" fill="rgba(255,255,255,.07)"/>
    <circle cx="174" cy="38" r="5"  fill="rgba(0,0,0,.22)"/>
    <circle cx="162" cy="50" r="3.5" fill="rgba(0,0,0,.18)"/>

    <!-- Small sun bottom right -->
    <circle cx="370" cy="385" r="20" fill="#f59e0b" opacity=".85" filter="url(#softglow)"/>
    <circle cx="370" cy="385" r="32" fill="rgba(245,158,11,.15)" filter="url(#softglow)"/>

    <!-- Dust particles -->
    <circle cx="230" cy="240" r="2.5" fill="#6366f1" opacity=".55"/>
    <circle cx="200" cy="210" r="2"   fill="#ec4899" opacity=".5"/>
    <circle cx="260" cy="260" r="2"   fill="#8b5cf6" opacity=".5"/>
    <circle cx="180" cy="280" r="1.8" fill="#a5b4fc" opacity=".45"/>

    <!-- ════ TEXT (bottom half) ════ -->

    <!-- Badge -->
    <rect x="20" y="255" width="220" height="32" rx="16" fill="rgba(16,185,129,.18)" stroke="rgba(16,185,129,.55)" stroke-width="1.2"/>
    <text x="130" y="276" text-anchor="middle" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#34d399">✦  Astronomy and space  ✦</text>

    <!-- Main title line 1 -->
    <text x="20" y="328" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="52" font-weight="900" fill="url(#titleG)" filter="url(#textglow)">اكتشف أسرار</text>
    <!-- Main title line 2 -->
    <text x="20" y="382" font-family="Cairo,Segoe UI,Arial,sans-serif" font-size="52" font-weight="900" fill="url(#subG)" filter="url(#textglow)">الكون</text>

    <!-- Underline -->
    <rect x="20" y="390" width="260" height="3" rx="1.5" fill="url(#subG)" opacity=".6"/>

    <!-- Feature badges bottom -->
    <rect x="20"  y="398" width="80"  height="18" rx="9" fill="rgba(99,102,241,.22)"  stroke="rgba(99,102,241,.5)"  stroke-width="1"/>
    <text x="60"  y="411" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="10" font-weight="700" fill="#a5b4fc">🎬 فيديوهات</text>

    <rect x="108" y="398" width="68"  height="18" rx="9" fill="rgba(236,72,153,.2)"   stroke="rgba(236,72,153,.5)"  stroke-width="1"/>
    <text x="142" y="411" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="10" font-weight="700" fill="#f9a8d4">🔴 مباشر</text>

    <rect x="184" y="398" width="62"  height="18" rx="9" fill="rgba(16,185,129,.2)"   stroke="rgba(16,185,129,.5)"  stroke-width="1"/>
    <text x="215" y="411" text-anchor="middle" font-family="Cairo,Arial,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">🆓 مجاني</text>

    <!-- Border -->
    <rect x="1" y="1" width="398" height="418" rx="17" fill="none" stroke="rgba(99,102,241,.45)" stroke-width="1.5"/>
    <rect x="3" y="3" width="394" height="414" rx="16" fill="none" stroke="rgba(236,72,153,.15)" stroke-width="1"/>
  </g>
</svg>
